version: 1
frontend:
  phases:
    preBuild:
      commands:
        - curl -L https://github.com/gohugoio/hugo/releases/download/v0.164.0/hugo_extended_0.164.0_linux-amd64.tar.gz -o /tmp/hugo.tar.gz
        - tar -xzf /tmp/hugo.tar.gz -C /tmp hugo
        - chmod +x /tmp/hugo
        - /tmp/hugo version
    build:
      commands:
        - /tmp/hugo --gc
  artifacts:
    baseDirectory: public
    files:
      - '**/*'
  cache:
    paths: []
